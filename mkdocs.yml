      - Platform: explanation/platform/README.md
  - Diagrams: diagrams/README.md
  - Assets: assets/README.md
  - Reference Indexes:
      - NPC (Platform docs live under Platform tab): reference/npc/README.md
      - NPS (specs live under Reference › NPS above): reference/nps/README.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search

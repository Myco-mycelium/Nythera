site_name: Nythera
site_description: Documentation for the Nythera operating system project
repo_url: https://github.com/your-org/Nythera
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

nav:
  - Home: 00-platform/000-THE_NYTHERA_MANIFEST.md
  - Platform:
      - Manifest: 00-platform/000-THE_NYTHERA_MANIFEST.md
      - Constitution: 00-platform/001-PROJECT_CONSTITUTION.md
      - AI Collaboration Protocol: 00-platform/002-AI_COLLABORATION_PROTOCOL.md
      - Engineering Handbook: 00-platform/003-ENGINEERING_HANDBOOK.md
      - Specification Index: 00-platform/004-SPECIFICATION_INDEX.md
      - ADR Index: 00-platform/005-ADR_INDEX.md
      - Glossary: 00-platform/006-GLOSSARY.md
      - Roadmap: 00-platform/007-PROJECT_ROADMAP.md
      - Subsystem Owners: 00-platform/SUBSYSTEM_OWNERS.md
      - Repository State: 00-platform/REPOSITORY_STATE.md
      - Change Request Log: 00-platform/CHANGE_REQUEST_LOG.md
  - Tutorials: tutorials/
  - How-To Guides: how-to/
  - Reference:
      - ADRs:
          - Index: reference/adr/README.md
          - ADR-0001 Diátaxis + MkDocs Material: reference/adr/ADR-0001-diataxis-mkdocs.md
          - ADR-0002 Copy-on-write filesystem: reference/adr/ADR-0002-filesystem.md
          - ADR-0003 Game disk images: reference/adr/ADR-0003-game-disk-images.md
          - ADR-0004 Containerized execution: reference/adr/ADR-0004-containerized-execution.md
          - ADR-0005 Windows compatibility layer: reference/adr/ADR-0005-windows-compat-layer.md
          - ADR-0006 Hybrid microkernel: reference/adr/ADR-0006-hybrid-microkernel.md
          - ADR-0007 Compression codec: reference/adr/ADR-0007-compression-codec.md
      - NPS:
          - NPS-001 Kernel Architecture and Boot: reference/nps/NPS-001-kernel-architecture-and-boot.md
          - NPS-002 Process and Thread Model: reference/nps/NPS-002-process-and-thread-model.md
          - NPS-003 IPC and Capability Passing: reference/nps/NPS-003-ipc-and-capability-passing.md
          - NPS-004 NyFS Filesystem Core: reference/nps/NPS-004-nyfs-filesystem-core.md
          - NPS-005 Transparent Compression Policy: reference/nps/NPS-005-transparent-compression-policy.md
          - NPS-006 Game Image Format (.nygi): reference/nps/NPS-006-game-image-format.md
      - ABI: reference/abi/
      - API: reference/api/
      - Package Format: reference/package-format/
      - Capability Registry: reference/capability-registry/
      - Object Registry: reference/object-registry/
  - Explanation:
      - Core Architecture:
          - Why a Hybrid Microkernel: explanation/architecture/why-hybrid-microkernel.md
      - Storage:
          - Why Mounted Game Images: explanation/storage/why-mounted-game-images.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search

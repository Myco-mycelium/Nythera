          - Why a Hybrid Microkernel: explanation/architecture/why-hybrid-microkernel.md
          - Why NyHAL Pluggable Backends: explanation/architecture/why-nyhal-pluggable-backends.md
          - (subsystem index): explanation/architecture/README.md
      - Storage:
          - Why Mounted Game Images: explanation/storage/why-mounted-game-images.md
          - (subsystem index): explanation/storage/README.md
      - Runtime:
          - Why One Shared Compatibility Model: explanation/runtime/why-shared-compatibility-model.md
          - (subsystem index): explanation/runtime/README.md
      - Security:
          - Why Capabilities Aren't Bolted On: explanation/security/why-capabilities-not-bolted-on.md
          - (subsystem index): explanation/security/README.md
      - Gaming:
          - Why Gaming Reuses the Platform: explanation/gaming/why-gaming-reuses-the-platform.md

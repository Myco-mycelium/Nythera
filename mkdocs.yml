          - NPS-016 Optional Cloud Synchronization: reference/nps/NPS-016-optional-cloud-synchronization.md
          - NPS-017 NyHAL Kernel Abstraction: reference/nps/NPS-017-nyhal-kernel-abstraction.md
      - Threat Model:
